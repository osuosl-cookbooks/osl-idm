---
driver:
  name: vagrant

verifier:
  name: inspec

transport:
  name: rsync

provisioner:
  name: cinc_infra
  product_version: '18'
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: debian-12
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[osl-idm::default]
